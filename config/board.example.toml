# Sink selection order used by the preview widgets.
[sink]
priority = ["ximagesink", "glimagesink"]

# Mediapipe hand detection models are auto-resolved from models/ directory.
# To override, uncomment:
# [mediapipe]
# detector_model = "/path/to/hand_detector.rknn"
# landmark_model = "/path/to/hand_landmarks.rknn"

# YOLO object detection model is auto-resolved from models/ directory.
# The default local pipeline submits frames at 5fps.
[yolo]
fps = 5
confidence_threshold = 0.25
nms_threshold = 0.45
max_detections = 50

# RTSP streaming.
[rtsp]
port = 8554
codec = "h265"
bitrate = 4000000
mounts = ["cam", "cam0", "cam1", "cam2", "cam3"]

# Microphone input used by the recording session.
[audio.mic0]
device = "hw:rockchipes8388,0"
rate = 16000
channels = 2

# 4路 MIPI 摄像头
[camera.cam0]
record_device = "/dev/video55"
input_format = "NV12"
io_mode = "dmabuf"
record_width = 1920
record_height = 1080
preview_width = 640
preview_height = 360
fps = 30
bitrate = 8000000

[camera.cam1]
record_device = "/dev/video64"
input_format = "NV12"
io_mode = "dmabuf"
record_width = 1920
record_height = 1080
preview_width = 640
preview_height = 360
fps = 30
bitrate = 8000000

[camera.cam2]
record_device = "/dev/video73"
input_format = "NV12"
io_mode = "dmabuf"
record_width = 1920

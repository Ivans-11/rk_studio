# Sink selection order used by the preview widgets.
[sink]
priority = ["ximagesink", "glimagesink"]

# AI hand detection models.
[ai]
detector_model = "/home/cat/mediapipe/hand_detector.rknn"
landmark_model = "/home/cat/mediapipe/hand_landmarks.rknn"
allow_rga = true

# RTSP streaming.
[rtsp]
port = 8554
codec = "h265"

# Microphone input used by the recording session.
[audio.mic0]
device = "hw:rockchipes8388,0"
rate = 16000
channels = 2

# 4路 MIPI 摄像头
[camera.cam0]
record_device = "/dev/video44"
input_format = "NV12"
io_mode = "dmabuf"
record_width = 1920
record_height = 1080
preview_width = 640
preview_height = 360
fps = 30
bitrate = 8000000

[camera.cam1]
record_device = "/dev/video53"
input_format = "NV12"
io_mode = "dmabuf"
record_width = 1920
record_height = 1080
preview_width = 640
preview_height = 360
fps = 30
bitrate = 8000000

